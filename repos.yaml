version: 1
defaults:
  branch: develop

repos:
  - name: yijie-codex
    path: ../yijie-codex
    url: https://github.com/36Dge/yijie-codex.git
    type: runtime
    owner: agent-runtime-team

  - name: yijie-desktop
    path: ../yijie-desktop
    url: https://github.com/36Dge/yijie-desktop.git
    type: app
    owner: client-team

  - name: yijie-admin-web
    path: ../yijie-admin-web
    url: https://github.com/36Dge/yijie-admin-web.git
    type: app
    owner: admin-platform-team

  - name: yijie-api
    path: ../yijie-api
    url: https://github.com/36Dge/yijie-api.git
    type: backend
    owner: backend-team

  - name: yijie-agent-host
    path: ../yijie-agent-host
    url: https://github.com/36Dge/yijie-agent-host.git
    type: runtime-adapter
    owner: agent-runtime-team

  - name: yijie-skills
    path: ../yijie-skills
    url: https://github.com/36Dge/yijie-skills.git
    type: ai-capabilities
    owner: ai-product-team

  - name: yijie-connectors
    path: ../yijie-connectors
    url: https://github.com/36Dge/yijie-connectors.git
    type: platform-connectors
    owner: integration-team

  - name: yijie-knowledge
    path: ../yijie-knowledge
    url: https://github.com/36Dge/yijie-knowledge.git
    type: rag
    owner: data-ai-team

  - name: yijie-contracts
    path: ../yijie-contracts
    url: https://github.com/36Dge/yijie-contracts.git
    type: contracts
    owner: platform-team

  - name: yijie-infra
    path: ../yijie-infra
    url: https://github.com/36Dge/yijie-infra.git
    type: infra
    owner: devops-team
